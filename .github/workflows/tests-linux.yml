name: Tests (Linux)

# Runs the full test suite on Ubuntu Linux to verify cross-platform
# compatibility. Companion to tests.yml (Windows). Both run independently
# on every push and PR — neither blocks the other.
#
# Why a separate workflow:
#   Linux needs system-level Qt dependencies (libegl1, libxkbcommon0, etc.)
#   that don't apply to Windows runners. Keeping them in a separate file
#   makes both workflows easier to read and debug than a single matrix.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Ubuntu / Python 3.13
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install system Qt dependencies
        # PyQt6 needs these system libraries even in offscreen mode.
        # The list covers the common Qt platform plugins; if a future
        # PyQt6 release adds new dependencies, expand this list.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libfontconfig1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        # QT_QPA_PLATFORM=offscreen is set in tests/conftest.py for pytest,
        # but the unittest suite reads it from the environment. Setting it
        # here ensures both suites run headlessly without an X server.
        env:
          QT_QPA_PLATFORM: offscreen
        run: python run_tests.py

      - name: Upload coverage report
        # Always upload, even if tests failed — the report is useful for
        # diagnosing which paths weren't reached on Linux vs Windows.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-linux
          path: |
            .coverage
            .coverage.unittest
            .coverage.pytest
          retention-days: 14
          if-no-files-found: ignore
