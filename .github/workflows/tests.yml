name: Tests

# Runs the full test suite (unittest + pytest) on every push and PR.
# Uses Windows runners since RNV Color Palette Manager targets Windows
# users specifically (e.g. font_loader.py uses Windows registry calls).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Windows / Python 3.13
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        # QT_QPA_PLATFORM=offscreen is set in tests/conftest.py for pytest,
        # but the unittest suite reads it from the environment. Setting it
        # here ensures both suites run headlessly.
        env:
          QT_QPA_PLATFORM: offscreen
        run: python run_tests.py

      - name: Upload coverage report
        # Always upload, even if tests failed — the report is useful for
        # diagnosing which paths weren't reached.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            .coverage.unittest
            .coverage.pytest
          retention-days: 14
          if-no-files-found: ignore
